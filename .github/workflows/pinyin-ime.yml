name: Build pinyin-ime and deploy Pages

on:
  repository_dispatch:
    types: [pinyin-ime]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build /pinyin-ime then deploy Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Hexo public output
        run: |
          npm install -g hexo-cli
          npm install
          npm run clean
          npm run build

      - name: Ensure .nojekyll under public and public/pinyin-ime
        run: |
          touch public/.nojekyll
          touch public/pinyin-ime/.nojekyll

      - name: Verify generated pinyin-ime files
        run: |
          echo "== public exists? =="
          ls -la public
          echo "== public/pinyin-ime exists? =="
          ls -la public/pinyin-ime
          test -f public/pinyin-ime/index.html
          test -f public/.nojekyll
          test -f public/pinyin-ime/.nojekyll
          echo "== ensure deploy root still contains pinyin-ime =="
          test -d public/pinyin-ime

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages-pinyin-ime
          path: ./public

      - name: Upload debug artifact for pinyin-ime
        uses: actions/upload-artifact@v4
        with:
          name: debug-public-pinyin-ime
          path: |
            public/pinyin-ime
            public/index.html
          if-no-files-found: error
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-pinyin-ime

