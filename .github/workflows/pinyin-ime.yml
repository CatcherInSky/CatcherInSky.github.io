name: Build pinyin-ime and sync to master

on:
  repository_dispatch:
    types: [pinyin-ime]

permissions:
  contents: write

jobs:
  deploy:
    name: Build /pinyin-ime then sync master
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Hexo public output
        run: |
          npm install -g hexo-cli
          npm install
          npm run clean
          npm run build

      - name: Sync public to master branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: master
          publish_dir: ./public
          keep_files: true
          force_orphan: false
          exclude_assets: ".github"

      - name: Trigger static Pages deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -f -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CatcherInSky/CatcherInSky.github.io/dispatches \
            -d '{"event_type":"static-deploy"}'

