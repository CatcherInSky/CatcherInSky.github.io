name: Build pinyin-ime and publish master/pinyin-ime

on:
  repository_dispatch:
    types: [pinyin-ime]

permissions:
  contents: write

jobs:
  deploy:
    name: Build /pinyin-ime then update master
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Hexo public output
        run: |
          npm install -g hexo-cli
          npm install
          npm run clean
          npm run build

      - name: Verify generated pinyin-ime files
        run: |
          echo "== public exists? =="
          ls -la public
          echo "== public/pinyin-ime exists? =="
          ls -la public/pinyin-ime
          test -f public/pinyin-ime/index.html

      - name: Sync pinyin-ime to master
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: master
          publish_dir: ./public/pinyin-ime
          destination_dir: pinyin-ime
          # Only replace the `pinyin-ime/` subtree; do not touch other branch files.
          force_orphan: false
          exclude_assets: ".github"

