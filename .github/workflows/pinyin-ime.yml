name: Build pinyin-ime and deploy Pages

on:
  repository_dispatch:
    types: [pinyin-ime]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build /pinyin-ime then deploy Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Hexo public output
        run: |
          npm install -g hexo-cli
          npm install
          npm run clean
          npm run build

      - name: Verify generated pinyin-ime files
        run: |
          echo "== public exists? =="
          ls -la public
          echo "== public/pinyin-ime exists? =="
          ls -la public/pinyin-ime
          test -f public/pinyin-ime/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

