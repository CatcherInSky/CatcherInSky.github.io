name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  repository_dispatch:
    types: [static-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./"

      - name: Verify checkout contains pinyin-ime
        run: |
          echo "== repo root pinyin-ime check =="
          ls -la
          ls -la pinyin-ime
          test -f pinyin-ime/index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
